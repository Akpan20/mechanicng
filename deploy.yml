name: Deploy MechanicNG

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  # ── 1. Type-check & lint ────────────────────────────────────────────────────
  validate:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Type-check backend
        run: npx tsc --noEmit
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Type-check frontend
        run: npm run type-check
        working-directory: frontend

  # ── 2. Deploy to VPS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: validate
    runs-on: ubuntu-latest
    environment: production   # requires approval if configured in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /var/www/mechanicng
            git pull origin main
            sudo bash redeploy.sh

      - name: Verify deployment
        run: |
          sleep 5
          curl -f "https://${{ secrets.DOMAIN }}/api/health" \
            || echo "Health check failed — check server logs"

# ── Required GitHub Secrets ─────────────────────────────────────────────────
# Set these in: GitHub repo → Settings → Secrets → Actions
#
# VPS_HOST        Your server IP or hostname
# VPS_USER        SSH user (root or sudo user)
# VPS_SSH_KEY     Private SSH key (generate with: ssh-keygen -t ed25519)
# VPS_PORT        SSH port (default 22)
# DOMAIN          Your domain, e.g. mechanicng.com